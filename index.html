<div id="videoContainer">
    <div id="player"></div>

    <div id="startOverlay">
        <div id="startText">Click Anywhere to Start</div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player;
let playerReady = false;
let currentIndex = 0;

const playlist = [
    "https://www.youtube.com/watch?v=0fCaU6bV3PI",
    "https://www.youtube.com/watch?v=4tQfzIrmYZA"
];

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: playlist[currentIndex],
        playerVars: {
            controls: 1,
            rel: 0
        },
        events: {
            'onReady': () => {
                playerReady = true;
            },
            'onStateChange': onPlayerStateChange
        }
    });
}

document.getElementById("startOverlay").addEventListener("click", () => {
    if (!playerReady) return;

    const overlay = document.getElementById("startOverlay");

    overlay.style.opacity = "0";

    setTimeout(() => {
        overlay.style.display = "none";
        player.playVideo();
    }, 500);
});

function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        currentIndex++;

        if (currentIndex >= playlist.length) {
            currentIndex = 0; // remove this line if you don't want looping
        }

        player.loadVideoById(playlist[currentIndex]);
    }
}
</script>
